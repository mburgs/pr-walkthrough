          - generic [ref=e324]:
            - generic [ref=e326]:
              - generic [ref=e327]: "This replaces the Phase 4 stub with a working ICSFeedPublisher. The publish method builds an RFC 5545 calendar object using the icalendar library, emits one VEVENT per BusyBlock with a fixed \"Busy\" summary and OPAQUE transparency, then writes the result as bytes to a configurable file path — the intended target being docs/availability.ics for GitHub Pages serving. The key design choice to scrutinise is the stable UID function: it hashes the ISO-formatted start and end timestamps with SHA-256 and appends \"@calsync\". This means UID stability is entirely dependent on the datetime precision and timezone representation in isoformat — if a BusyBlock's timestamps ever come in without timezone info, or with different offsets representing the same instant, you'll get a different UID and consumers that delta-sync by UID will see spurious create/delete churn. One other detail worth noting: dtstamp is set to datetime.now(UTC) at publish time, so it will differ across runs for the same block, which is correct per RFC 5545 but means the file is never byte-for-byte idempotent even when nothing changed."
