[project]
name = "pr-walkthrough-backend"
version = "0.1.0"
description = "Backend for pr-walkthrough (context retrieval — stream 7)"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[project.scripts]
pr-context = "pr_walkthrough.context.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["pr_walkthrough*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
