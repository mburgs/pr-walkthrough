[project]
name = "pr-walkthrough-backend"
version = "0.1.0"
description = "Backend orchestrator for pr-walkthrough"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "pydantic>=2.6",
    "sse-starlette>=2.1",
    "httpx>=0.27",
    "anyio>=4.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["pr_walkthrough*"]

# Make contracts importable as a sibling package
[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = [
    ".",
    "..",   # exposes contracts/ from the repo root
]
